version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: spacelish-postgres-dev
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - spacelish-network

  # pgAdmin - Web interface for PostgreSQL management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: spacelish-pgadmin-dev
    restart: unless-stopped
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_dev_data:/var/lib/pgadmin
    networks:
      - spacelish-network
    depends_on:
      - postgres

  # NestJS Application (Development with hot reload)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: spacelish-app-dev
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      # Database connection
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    ports:
      - "${APP_PORT}:3000"
      - "${DEBUG_PORT}:9229"  # Debug port
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
    networks:
      - spacelish-network
    depends_on:
      - postgres
    command: npm run start:dev

volumes:
  postgres_dev_data:
    driver: local
  pgadmin_dev_data:
    driver: local

networks:
  spacelish-network:
    driver: bridge
