version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: spacelish-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: spacelish
      POSTGRES_USER: spacelish_user
      POSTGRES_PASSWORD: spacelish_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - spacelish-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spacelish_user -d spacelish"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - Web interface for PostgreSQL management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: spacelish-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@spacelish.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - spacelish-network
    depends_on:
      - postgres

  # NestJS Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: spacelish-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Database connection
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: spacelish_user
      DB_PASSWORD: spacelish_password
      DB_DATABASE: spacelish
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs
    networks:
      - spacelish-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: spacelish-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    networks:
      - spacelish-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  spacelish-network:
    driver: bridge
